name: macOS Release

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
    branches: [main]

jobs:
  check-release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Check for new release
        id: tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release list --repo "${{ github.repository }}" --limit 1 \
            --json tagName,publishedAt \
            | jq -r --arg t "${{ github.event.workflow_run.run_started_at }}" \
            '[.[] | select(.publishedAt > $t)] | .[0].tagName // ""')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build-macos:
    needs: check-release
    if: needs.check-release.outputs.tag != ''
    runs-on: macos-26
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-${{ runner.os }}-grpc-v1
          restore-keys: brew-${{ runner.os }}-

      - name: Install dependencies
        run: brew install grpc create-dmg

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: compute/tokenizers-sys/target
          key: tokenizers-sys-${{ runner.os }}-${{ hashFiles('compute/tokenizers-sys/Cargo.lock', 'compute/tokenizers-sys/src/**') }}
          restore-keys: tokenizers-sys-${{ runner.os }}-

      - name: Build tokenizers-sys
        run: cargo build --release --manifest-path compute/tokenizers-sys/Cargo.toml

      - name: Cache CMake fetched dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: cmake-deps-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: cmake-deps-${{ runner.os }}-

      - name: Cache CMake build objects
        uses: actions/cache@v4
        with:
          path: |
            build
            !build/_deps
          key: cmake-build-release-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt', 'compute/src/**', 'service/src/**', 'models/src/**', 'cli/src/**') }}
          restore-keys: cmake-build-release-${{ runner.os }}-

      - name: Build (C++ — all targets)
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(sysctl -n hw.logicalcpu)
          cmake --install build --component neurons_core --prefix gui/macos/neurons_core_lib

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Flutter pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('gui/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install Flutter dependencies
        run: cd gui && flutter pub get

      - name: Install protoc-gen-dart
        run: dart pub global activate protoc_plugin

      - name: Generate Dart proto stubs
        run: bash scripts/gen_proto.sh

      - name: Build Flutter macOS app
        run: cd gui && flutter build macos --release

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Neurons" \
            --window-size 660 400 \
            --icon-size 128 \
            --icon "Neurons.app" 180 200 \
            --app-drop-link 480 200 \
            "Neurons-${{ needs.check-release.outputs.tag }}-arm64.dmg" \
            "gui/build/macos/Build/Products/Release/Neurons.app"

      - name: Upload DMG to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.check-release.outputs.tag }}" \
            "Neurons-${{ needs.check-release.outputs.tag }}-arm64.dmg"

      - name: Upload neurons binary to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp build/bin/neurons "neurons-${{ needs.check-release.outputs.tag }}-arm64"
          gh release upload "${{ needs.check-release.outputs.tag }}" \
            "neurons-${{ needs.check-release.outputs.tag }}-arm64"
