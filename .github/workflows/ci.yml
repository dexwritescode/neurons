name: CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  build:
    runs-on: macos-26   # arm64 Apple Silicon — required for MLX Metal backend

    steps:
      - uses: actions/checkout@v4

      - name: Install gRPC + Protobuf
        run: brew install grpc

      # Cache the CMake FetchContent downloads (MLX, cli11, nlohmann-json, etc.)
      # Key includes the CMakeLists hash so the cache busts when deps change.
      - name: Cache CMake dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: cmake-deps-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: cmake-deps-${{ runner.os }}-

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.logicalcpu)

      - name: Unit tests
        # Skip integration tests — they need model files from ~/.neurons/models/.
        # The GTEST_SKIP guards in each integration test handle absent models gracefully,
        # but ctest's --label-exclude is cleaner.
        run: |
          cmake --build build --target all-tests -j$(sysctl -n hw.logicalcpu)
          ctest --test-dir build --output-on-failure \
                --label-exclude integration \
                --timeout 120
