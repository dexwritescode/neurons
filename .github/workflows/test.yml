name: Test

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Install gRPC + Protobuf
        run: brew install grpc

      - name: Cache CMake dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: cmake-deps-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: cmake-deps-${{ runner.os }}-

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build test targets
        run: cmake --build build --target all-tests -j$(sysctl -n hw.logicalcpu)

      - name: C++ unit tests
        run: |
          ctest --test-dir build --output-on-failure \
                --label-exclude integration \
                --timeout 120

      - name: Flutter tests
        run: |
          cd gui
          flutter test
