name: Build

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Install gRPC + Protobuf
        run: brew install grpc

      - name: Cache CMake dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: cmake-deps-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: cmake-deps-${{ runner.os }}-

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build --target all-tests -j$(sysctl -n hw.logicalcpu)

      - name: Upload test binaries
        uses: actions/upload-artifact@v4
        with:
          name: test-binaries-${{ github.sha }}
          path: |
            build/compute/compute_tests
            build/service/service_tests
            build/models/model_tests
          retention-days: 1
