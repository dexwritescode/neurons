name: Build

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-${{ runner.os }}-grpc-v1
          restore-keys: brew-${{ runner.os }}-

      - name: Install gRPC + Protobuf
        run: brew install grpc

      - name: Cache CMake fetched dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: cmake-deps-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: cmake-deps-${{ runner.os }}-

      - name: Cache CMake build objects
        uses: actions/cache@v4
        with:
          path: |
            build
            !build/_deps
          key: cmake-build-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt', 'compute/src/**', 'service/src/**', 'models/src/**', 'cli/src/**') }}
          restore-keys: cmake-build-${{ runner.os }}-

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.logicalcpu)
