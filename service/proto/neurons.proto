syntax = "proto3";

package neurons;

// ── Service ──────────────────────────────────────────────────────────────────

service NeuronsInference {
  // Load a model from a local path. Unloads any previously loaded model.
  rpc LoadModel      (LoadModelRequest)      returns (LoadModelResponse);

  // Unload the current model and free resources.
  rpc UnloadModel    (UnloadModelRequest)    returns (UnloadModelResponse);

  // Generate tokens for a prompt. Streams one GenerateResponse per event.
  // Events: token frames, tool calls, tool results, approval requests.
  // The final message has done=true and includes total token counts.
  rpc Generate       (GenerateRequest)       returns (stream GenerateResponse);

  // Resume a generation paused on an always_ask tool approval.
  rpc RespondToolApproval (ToolApprovalResponse) returns (ToolApprovalResult);

  // Return status of the service (loaded model, backend, etc.).
  rpc GetStatus      (StatusRequest)         returns (StatusResponse);

  // List models found in the models directory (~/.neurons/models/).
  rpc ListModels     (ListModelsRequest)     returns (ListModelsResponse);

  // Search HuggingFace Hub for models.
  rpc SearchModels   (SearchModelsRequest)   returns (SearchModelsResponse);

  // Fetch file list, total size, and README for a HuggingFace model.
  rpc GetModelInfo   (GetModelInfoRequest)   returns (GetModelInfoResponse);

  // Download a model from HuggingFace. Streams progress frames until done.
  rpc DownloadModel  (DownloadModelRequest)  returns (stream DownloadProgressResponse);

  // Cancel an active download by download_id.
  rpc CancelDownload (CancelDownloadRequest) returns (CancelDownloadResponse);

  // Set (or clear) the HuggingFace Bearer token for gated model access.
  // Pass an empty string to clear. The token is held in memory only — never
  // persisted by the service. Clients should re-send on reconnect.
  rpc SetHfToken     (SetHfTokenRequest)     returns (SetHfTokenResponse);

  // Stream log entries from the service. Stays open until client cancels.
  rpc StreamLogs     (StreamLogsRequest)     returns (stream LogEntry);

  // ── MCP server management ──────────────────────────────────────────────────
  rpc ListMcpServers  (ListMcpServersRequest)  returns (ListMcpServersResponse);
  rpc AddMcpServer    (AddMcpServerRequest)    returns (AddMcpServerResponse);
  rpc RemoveMcpServer (RemoveMcpServerRequest) returns (RemoveMcpServerResponse);

  // Push controller's server list to a node operating in inherit mode.
  rpc PushMcpServers  (PushMcpServersRequest)  returns (PushMcpServersResponse);

  // ── MCP permission management ──────────────────────────────────────────────
  rpc ListPermissionRules  (ListPermissionRulesRequest)  returns (ListPermissionRulesResponse);
  rpc SetPermissionRule    (SetPermissionRuleRequest)    returns (SetPermissionRuleResponse);
  rpc DeletePermissionRule (DeletePermissionRuleRequest) returns (DeletePermissionRuleResponse);
}

// ── LoadModel ────────────────────────────────────────────────────────────────

message LoadModelRequest {
  string model_path = 1;  // Absolute path to the model directory
}

message LoadModelResponse {
  bool   success                = 1;
  string error                  = 2;  // Non-empty on failure
  string model_type             = 3;  // e.g. "mistral", "llama"
  uint32 vocab_size             = 4;
  uint32 num_layers             = 5;
  uint32 max_position_embeddings = 6;  // Model's maximum context length in tokens
  bool   supports_tool_use      = 7;  // True if the model supports function/tool calling
}

// ── UnloadModel ──────────────────────────────────────────────────────────────

message UnloadModelRequest {}

message UnloadModelResponse {
  bool success = 1;
}

// ── Generate ─────────────────────────────────────────────────────────────────

message ChatMessage {
  string role    = 1;  // "user" | "assistant" | "system"
  string content = 2;
}

message SamplingParams {
  float temperature   = 1;  // 0.0 = greedy
  float top_p         = 2;
  int32 top_k         = 3;
  float rep_penalty   = 4;
  int32 max_tokens    = 5;
  int32 context_window = 6;  // Max tokens of context to include (0 = model max)
}

message GenerateRequest {
  // Conversation history (all prior turns). The service applies the
  // model's chat template to format the full prompt.
  repeated ChatMessage history = 1;

  // The new user message to respond to.
  string prompt = 2;

  // Sampling configuration. If omitted, service defaults apply.
  SamplingParams params = 3;

  // MCP server names to activate for this generation (must be configured on
  // the node). Empty = no tool use even if model supports it.
  repeated string active_mcp_servers = 4;

  // Chat session ID — used to scope session-level permission overrides and
  // per-chat permission rules.
  string session_id = 5;
}

// ── Tool events (interleaved in the Generate stream) ─────────────────────────

// Emitted when the model has issued a tool call and the service is about to
// execute it (permission already granted).
message ToolCallEvent {
  string server    = 1;  // MCP server name
  string tool      = 2;  // Tool name
  string args_json = 3;  // Raw JSON arguments
}

// Emitted after a tool call completes.
message ToolResultEvent {
  string server      = 1;
  string tool        = 2;
  string result_json = 3;
  int64  elapsed_ms  = 4;
  bool   error       = 5;  // True if the tool returned an error result
}

// Emitted when a tool call requires explicit user approval (always_ask).
// Generation is paused until RespondToolApproval is called with this ID.
message ToolApprovalRequest {
  string approval_id  = 1;  // UUID — pass back in ToolApprovalResponse
  string server       = 2;
  string tool         = 3;
  string args_json    = 4;
  string description  = 5;  // Human-readable summary of what the tool will do
  bool   destructive  = 6;  // True for write/execute tools — GUI shows red banner
}

message GenerateResponse {
  oneof event {
    string             token            = 1;  // Decoded token text
    ToolCallEvent      tool_call        = 6;  // Tool about to execute
    ToolResultEvent    tool_result      = 7;  // Tool finished
    ToolApprovalRequest approval_request = 8; // Waiting for user approval
  }
  bool   done          = 2;  // True on the final message
  uint32 prompt_tokens = 3;  // Only set when done=true
  uint32 gen_tokens    = 4;  // Only set when done=true
  string error         = 5;  // Non-empty if generation failed
}

// ── Tool approval ─────────────────────────────────────────────────────────────

message ToolApprovalResponse {
  string approval_id     = 1;
  bool   approved        = 2;
  // Optional: update the persisted rule for this (server, tool) going forward.
  // Empty = one-shot decision, nothing saved.
  string new_permission  = 3;  // "allow_session" | "always_allow" | "always_deny"
}

message ToolApprovalResult {
  bool   success = 1;
  string error   = 2;  // Non-empty if approval_id was not found / already resolved
}

// ── GetStatus ────────────────────────────────────────────────────────────────

message StatusRequest {}

// One GPU (or unified-memory device) registered on a node.
message GpuSlot {
  string gpu_id          = 1;  // "0", "1", … — unique within the node
  string gpu_name        = 2;  // e.g. "Apple M2 Max", "NVIDIA RTX 4090"
  uint64 vram_total_bytes = 3;  // 0 if unified / unknown
  uint64 vram_used_bytes  = 4;  // 0 if not measurable
  string loaded_model    = 5;  // model path, empty if none
  string model_type      = 6;  // e.g. "gemma3", "llama", empty if none
  float  tok_per_sec     = 7;  // last measured generation speed; 0 if idle
}

message StatusResponse {
  bool   model_loaded             = 1;
  string model_path               = 2;
  string model_type               = 3;
  string backend                  = 4;  // e.g. "mlx", "cuda", "cpu"
  uint32 vocab_size               = 5;
  uint32 num_layers               = 6;
  uint32 max_position_embeddings  = 7;  // Model's maximum context length in tokens
  repeated GpuSlot gpus           = 8;  // One entry per GPU/device on this node
  uint32 http_port                = 9;  // OpenAI HTTP server port; 0 if not running
  bool   supports_tool_use        = 10; // True if the loaded model supports function/tool calling
}

// ── ListModels ───────────────────────────────────────────────────────────────

message ListModelsRequest {
  string models_dir = 1;  // If empty, defaults to ~/.neurons/models/
}

message ModelInfo {
  string name       = 1;  // e.g. "mlx-community/Mistral-7B-Instruct-v0.3-8bit"
  string path       = 2;  // Absolute path
  uint64 size_bytes = 3;  // Total size on disk
}

message ListModelsResponse {
  repeated ModelInfo models = 1;
}

// ── SearchModels ──────────────────────────────────────────────────────────────

message SearchModelsRequest {
  string query  = 1;
  int32  limit  = 2;  // 0 = server default (30)
  string sort   = 3;  // "downloads" | "likes" | "trending" | "lastModified"; default "downloads"
  repeated string pipeline_tags = 4;  // e.g. ["text-generation"]; empty = no filter
  string author = 5;  // org filter e.g. "mlx-community"; empty = all
}

message HfModelResult {
  string model_id  = 1;  // e.g. "mlx-community/Mistral-7B-Instruct-v0.3-4bit"
  int64  downloads = 2;  // All-time download count from HuggingFace
  bool   gated     = 3;  // Requires HuggingFace account approval to download
}

message SearchModelsResponse {
  repeated HfModelResult results = 1;
  string error = 2;
}

// ── GetModelInfo ──────────────────────────────────────────────────────────────

message GetModelInfoRequest {
  string model_id = 1;
}

message HfFileInfo {
  string filename   = 1;
  int64  size_bytes = 2;
}

message GetModelInfoResponse {
  string              model_id         = 1;
  int64               total_size_bytes = 2;
  repeated HfFileInfo files            = 3;
  string              readme           = 4;  // Raw markdown text
  string              error            = 5;
}

// ── DownloadModel ─────────────────────────────────────────────────────────────

message DownloadModelRequest {
  string model_id = 1;
}

message DownloadProgressResponse {
  string download_id      = 1;
  string current_file     = 2;
  int64  bytes_downloaded = 3;
  int64  total_bytes      = 4;
  double speed_bps        = 5;  // Bytes per second (smoothed)
  bool   done             = 6;  // True on the final frame (success)
  bool   cancelled        = 7;
  string error            = 8;  // Non-empty if failed
}

// ── CancelDownload ────────────────────────────────────────────────────────────

message CancelDownloadRequest {
  string download_id = 1;
}

message CancelDownloadResponse {
  bool success = 1;
}

// ── SetHfToken ────────────────────────────────────────────────────────────────

message SetHfTokenRequest {
  string token = 1;  // Bearer token; empty string clears
}

message SetHfTokenResponse {}

// ── StreamLogs ────────────────────────────────────────────────────────────────

message StreamLogsRequest {
  string min_level = 1;  // "INFO" (default), "WARN", "ERROR"
}

message LogEntry {
  int64  timestamp_ms = 1;
  string level        = 2;  // "INFO" | "WARN" | "ERROR"
  string message      = 3;
}

// ── MCP ───────────────────────────────────────────────────────────────────────

message McpServerConfig {
  string              name      = 1;
  string              transport = 2;  // "stdio" | "sse"
  string              command   = 3;  // stdio: executable path
  repeated string     args      = 4;  // stdio: arguments
  string              url       = 5;  // sse: endpoint URL
  map<string, string> env       = 6;  // environment variables
  bool                enabled   = 7;
}

// A permission rule. Rules are evaluated in order; first match wins.
// arg_constraints: JSON object whose keys are arg field names and values are
// glob patterns matched against the corresponding field in the tool's args_json.
// Empty arg_constraints matches any invocation of the tool.
message PermissionRule {
  string server           = 1;  // exact server name or "*"
  string tool             = 2;  // exact tool name or "*"
  string arg_constraints  = 3;  // JSON object e.g. {"path":"/Users/dex/src/**"}
  string permission       = 4;  // "always_allow" | "allow_session" | "always_ask" | "always_deny"
  string scope            = 5;  // "global" | "session:<id>" | "chat:<id>"
  int32  priority         = 6;  // lower = evaluated first; default 0
}

// ── MCP server management ─────────────────────────────────────────────────────

message ListMcpServersRequest {}
message ListMcpServersResponse {
  repeated McpServerConfig servers = 1;
}

message AddMcpServerRequest {
  McpServerConfig server = 1;
}
message AddMcpServerResponse {
  bool   success = 1;
  string error   = 2;
}

message RemoveMcpServerRequest {
  string name = 1;
}
message RemoveMcpServerResponse {
  bool   success = 1;
  string error   = 2;
}

// Controller pushes its server list to a node in inherit mode.
message PushMcpServersRequest {
  repeated McpServerConfig servers = 1;
}
message PushMcpServersResponse {
  bool success = 1;
}

// ── MCP permission management ─────────────────────────────────────────────────

message ListPermissionRulesRequest {
  string scope = 1;  // filter by scope; empty = return all
}
message ListPermissionRulesResponse {
  repeated PermissionRule rules = 1;
}

message SetPermissionRuleRequest {
  PermissionRule rule = 1;
}
message SetPermissionRuleResponse {
  bool   success = 1;
  string error   = 2;
}

message DeletePermissionRuleRequest {
  string server = 1;
  string tool   = 2;
  string scope  = 3;
}
message DeletePermissionRuleResponse {
  bool success = 1;
}
